<body>
	<div id="myplot" style="max-width:580px;"></div>
<script src="https://d3js.org/d3.v6.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js" integrity="sha256-qXBd/EfAdjOA2FGrGAG+b3YBn2tn5A6bhz+LSgYD96k=" crossorigin="anonymous"></script>
<script>
// TODO

// TODO remove data
const ageData = [

	},
	{

	},

	{

const ageDataMany = [
	{

		count: 10

	{
		interval: {left: 10, right: 20},
		count: 20
	},
	{
		interval: {left: 20, right: 30},
		count: 30
	},
	{
		interval: {left: 30, right: 40},
		count: 40
	},
	{

		count: 50
	},
	{
		interval: {left: 50, right: 60},
		count: 60

const yearData = [
	{
		interval: {left: null, right: 1970},
		count: 5
	},
	{
		interval: {left: 1970, right: 1990},
		count: 10
	},
	{
		interval: {left: 1990, right: 2000},
		count: 7
	},
	{
		interval: {left: 2000, right: 2020},
		count: 0
	},
	{
		interval: {left: 2020, right: null},
		count: 30
	},
];

const yearDataMany = [
	{
		interval: {left: null, right: 1960},
		count: 5
	},
	{
		interval: {left: 1960, right: 1970},
		count: 10
	},
	{
		interval: {left: 1970, right: 1980},
		count: 15
	},
	{
		interval: {left: 1980, right: 1990},
		count: 20
	},
	{
		interval: {left: 1990, right: 2000},
		count: 25
	},
	{
		interval: {left: 2000, right: 2010},
		count: 30
	},
	{
		interval: {left: 2010, right: 2020},
		count: 35
	},
	{
		interval: {left: 2020, right: null},
		count: 40
	},

];

const data = yearData;

const xAxisLabel = "Year";


// -- CONFIG --
let config = {};

// Debug grid
config.debug = false;

// Whole SVG area
config.canvas = {};
config.canvas.height = 320;  // px
config.canvas.width = 580;  // px
config.canvas.fontFamily = "sans-serif";

// Margins
// Following https://observablehq.com/@d3/margin-convention
config.margin = {};
config.margin.left = 50; // px
config.margin.right = 5; // px 
config.margin.top =  10; // px. Give a little headroom to not truncate text
config.margin.bot =  50; // px

// X tick labels
config.xTickLabels = {};
config.xTickLabels.marginBot = 32; // px. Push the labels above the X axis label
config.xTickLabels.fontSize = 10;
config.xTickLabels.textAnchor = "middle";
config.xTickLabels.yBaseline = config.canvas.height - config.xTickLabels.marginBot; // px

// Y tick labels
config.yTickLabels = {};
config.yTickLabels.fontSize = config.xTickLabels.fontSize;

// Horizontal bins
config.hbin = {};
config.hbin.height = 3;  // px
config.hbin.gap = 7;     // px
config.hbin.defaultDuration = 10;  // years. used for unbounded intervals, e.g. 90+ will visually appear as spanning 10 years

// Inner plotting area where the vertical bins lie
// The inner plotting area
config.vbinSurface = {};
config.vbinSurface.x1 = config.margin.left;                                // px
config.vbinSurface.x2 = config.canvas.width - config.margin.right;         // px
config.vbinSurface.y1 = config.margin.top;                                 // px
config.vbinSurface.y2 = config.canvas.height - config.margin.bot;          // px
config.vbinSurface.width = config.vbinSurface.x2 - config.vbinSurface.x1;  // px
config.vbinSurface.height = config.vbinSurface.y2 - config.vbinSurface.y1; // px

// Vertical bins
config.vbin = {};
config.vbin.width = 30;  // px
config.vbin.color = "#1c3d5a";

// X axis label
config.xAxisLabel = {};
config.xAxisLabel.x = config.margin.left + config.vbinSurface.width / 2;  // px
config.xAxisLabel.y = config.canvas.height - 5;  // px

// Y axis label
config.yAxisLabel = {};
config.yAxisLabel.x = 15;  // px. push text to the right so it's not truncated
config.yAxisLabel.y = (config.vbinSurface.y2 - config.vbinSurface.y1) / 2;
config.yAxisLabel.text = "Individuals";
config.yAxisLabel.textAnchor = "middle";



// -- HELPER FUNCTIONS --

/* Close open-ended intervals.
 *
 * Given a datum with an open-ended interval, we close it with a pre-defined default duration.
 * The purpose is to set a duration so the interval can be positioned.
 */
function closeInterval(datum) {
	var closedInterval;
	if (datum.interval.left === null) {
		closedInterval = {
			...datum.interval,
			left: datum.interval.right - config.hbin.defaultDuration
		}
	} else if (datum.interval.right === null) {
		closedInterval = {
			...datum.interval,
			right: datum.interval.left + config.hbin.defaultDuration
		}
	} else {
		closedInterval = datum.interval;
	}

	return {
		...datum,
		interval: closedInterval
	}
}

/* Decrement interval right value.
 *
 * For example change 0–10 and 10–20 to 0–9 and 10–19, to show intervals are contiguous.
 */
function decrIntervalRight(datum) {
	return {
		...datum,
		interval: {
			...datum.interval,
			right: datum.interval.right - 1
		}
	}
};

/* Return x1 and x2 bin positions (on canvas range) given the full set of bins and a specific bin,
 * taking into account the gap between bins.
 */
function binXpos(data, datum) {
	const first = 0;
	const last = data.length - 1;
	const datumIdx = _.indexOf(data, datum);
	const halfGap = config.hbin.gap / 2;

	let x1 = scaleX(datum.interval.left);
	if (datumIdx !== first) {
		x1 += halfGap;
	}
	let x2 = scaleX(datum.interval.right)
	if (datumIdx !== last) {
		x2 -= halfGap;
	}

	return {
		x1: x1,
		x2: x2,
	}
}

/* Return the textual representation of a bin label */
function stringLabel(datum) {
	if (datum.interval.left === null) {
		return `up to ${datum.interval.right}`;
	} else if (datum.interval.right === null){
		return `${datum.interval.left} and up`;
	} else {
		return `${datum.interval.left}–${datum.interval.right}`;
	}
};

/* Display a grid to help identify drawing issues */
function debug() {
	let dbgData = [];

	// Vertical lines
	for (var xx = 0; xx < config.canvas.width; xx += 10) {
		let stroke = "rgba(178, 232, 217, 0.5)";
		if (xx % 100 === 0) {
			stroke = "rgba(255, 182, 88, 0.5)";
		}
		dbgData.push({"x1": xx, "y1": 0, "x2": xx, "y2": config.canvas.height, "stroke": stroke});
	}

	// Horizontal lines
	for (var yy = 0; yy < config.canvas.height; yy += 10) {
		let stroke = "rgba(0, 0, 0, 0.1)";
		if (yy % 100 === 0) {
			stroke = "rgba(0, 0, 0, 0.20)";
		}
		dbgData.push({"x1": 0, "y1": yy, "x2": config.canvas.width, "y2": yy, "stroke": stroke});
	}

	svg.append("g")
		.selectAll("line")
		.data(dbgData)
		.enter()
			.append("line")
			.attr("x1", d => d.x1)
			.attr("y1", d => d.y1)
			.attr("x2", d => d.x2)
			.attr("y2", d => d.y2)
			.attr("stroke", d => d.stroke)
	;
}

// -- DATA TRANSFORMATION --
// Functions that helps mapping input data (domain) to output (range on canvas)

// Data with closed intervals, so they can be positioned
const closedIntervalData = _.map(data, closeInterval);

// The X and Y scales are in the plotting area
const scaleX = d3.scaleLinear()
	.domain(d3.extent(_.flatMap(closedIntervalData, d => [d.interval.left, d.interval.right])))
	.range([config.vbinSurface.x1, config.vbinSurface.x2]);

const scaleY = d3.scaleLinear()
	.domain([0, d3.max(closedIntervalData, d => d.count)])
	.range([config.vbinSurface.y2, config.vbinSurface.y1]);

// VBin
function vbinPosDim(data) {
	return _.map(data, (datum) => {
		const pos = binXpos(data, datum);
		const middle = (pos.x1 + pos.x2) / 2;
		const left = middle - config.vbin.width / 2;

		const top = scaleY(datum.count);
		const height = scaleY(0) - top;  // rect height is drawn towards bottom
		return {
			x: left,
			width: config.vbin.width,
			y: top,
			height: height,
			fill: config.vbin.color
		}
	})
};

// HBin
function hbinPosDim(data) {
	const hbins = _.map(data, (datum) => {
		const pos = binXpos(data, datum);
		const x1 = pos.x1;
		const x2 = pos.x2;
		const width = x2 - x1

		return {
			x: x1,
			width: width,
			y: config.vbinSurface.y2,
			height: config.hbin.height
		}
	})

	return hbins
};


// X ticks
function xTickLabelsPosText(data) {
	return _.map(data, (datum) => {
		const text = stringLabel(datum);
		const pos = binXpos(data, datum);
		const x = (pos.x1 + pos.x2) / 2;
		const y = config.xTickLabels.yBaseline;
		return {
			text: text,
			x: x,
			y: y,
		}
	})
}

// Y ticks
let yAxis = g => {
	return g
		.attr("transform", `translate(${config.margin.left}, 0)`)
		.call(d3.axisLeft(scaleY))
}

// Apply all data transformations
function dataToPlot(data, config) {
	let cdata = _.map(data, closeInterval);
	cdata = _.map(cdata, decrIntervalRight);

	// Compute hbin
	const hbins = hbinPosDim(cdata);

	// Compute vbin
	const vbins = vbinPosDim(cdata);

	// Labels
	const labels = xTickLabelsPosText(cdata);

	const res = _.zipWith(hbins, vbins, labels, (hbin, vbin, label) => {
		return {
			hbin: hbin,
			vbin: vbin,
			label: label
		}
	})

	return res
};



// -- PLOT FUNCTIONS --
const pdata = dataToPlot(data, config);

const svg = d3.select("#myplot")
	.append("svg")
	// Setting the viewBox and not setting the SVG width and height allows for dynamic resizing
	.attr("viewBox", [0, 0, config.canvas.width, config.canvas.height])
	.attr("font-family", config.canvas.fontFamily);


// Bin groups
const groups = svg.selectAll("g")
	.data(pdata)
	.enter()
		.append("g");

// .. Draw HBins
groups.append("rect")
	.attr("x", d => d.hbin.x)
	.attr("y", d => d.hbin.y)
	.attr("width", d => d.hbin.width)
	.attr("height", d => d.hbin.height);

// .. Draw VBins
groups.append("rect")
	.attr("x", d => d.vbin.x)
	.attr("y", d => d.vbin.y)
	.attr("width", d => d.vbin.width)
	.attr("height", d => d.vbin.height)
	.attr("fill", d => d.vbin.fill);


// Draw X ticks
svg.append("g")
	.attr("font-size", config.xTickLabels.fontSize)
	.selectAll("text")
	.data(pdata)
	.enter()
		.append("text")
		.attr("x", d => d.label.x)
		.attr("y", d => d.label.y)
		.attr("text-anchor", config.xTickLabels.textAnchor)
		.text(d => d.label.text);


// Draw Y ticks
svg.append("g")
	.call(yAxis)
	.attr("font-size", config.yTickLabels.fontSize);


// Draw X label
svg.append("text")
	.attr("text-anchor", "middle")
	.attr("x", config.xAxisLabel.x)
	.attr("y", config.xAxisLabel.y)
	.text(xAxisLabel);


// Draw Y label
svg.append("text")
	.attr("text-anchor", config.yAxisLabel.textAnchor)
	.attr("transform", `translate(${config.yAxisLabel.x}, ${config.yAxisLabel.y}) rotate(-90)`)
	.text(config.yAxisLabel.text);


// -- DEBUG --
if (config.debug) {
	debug();
}
</script>
